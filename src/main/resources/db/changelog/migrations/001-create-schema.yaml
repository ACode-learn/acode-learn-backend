databaseChangeLog:
  - changeSet:
      id: 001-create-schema
      author: migration
      comment: Initial schema for acodelearn platform
      changes:
        - createTable:
            tableName: "user"
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: username
                  type: VARCHAR(100)
                  constraints:
                    nullable: false
                    unique: true
              - column:
                  name: first_name
                  type: VARCHAR(100)
              - column:
                  name: last_name
                  type: VARCHAR(100)
              - column:
                  name: email
                  type: VARCHAR(255)
              - column:
                  name: created_at
                  type: TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
              - column:
                  name: version
                  type: BIGINT
                  defaultValueNumeric: 0

        - createTable:
            tableName: course
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: title
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: section_name
                  type: VARCHAR(100)
                  defaultValue: Section
              - column:
                  name: semester
                  type: INTEGER
              - column:
                  name: created_at
                  type: TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
              - column:
                  name: version
                  type: BIGINT
                  defaultValueNumeric: 0

        - createTable:
            tableName: course_has_user
            columns:
              - column:
                  name: course_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false

        - addPrimaryKey:
            tableName: course_has_user
            columnNames: course_id, user_id

        - addForeignKeyConstraint:
            baseTableName: course_has_user
            baseColumnNames: course_id
            referencedTableName: course
            referencedColumnNames: id
            constraintName: fk_chu_course

        - addForeignKeyConstraint:
            baseTableName: course_has_user
            baseColumnNames: user_id
            referencedTableName: "user"
            referencedColumnNames: id
            constraintName: fk_chu_user

        - createTable:
            tableName: user_has_course
            columns:
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: course_id
                  type: BIGINT
                  constraints:
                    nullable: false

        - addPrimaryKey:
            tableName: user_has_course
            columnNames: user_id, course_id

        - addForeignKeyConstraint:
            baseTableName: user_has_course
            baseColumnNames: user_id
            referencedTableName: "user"
            referencedColumnNames: id
            constraintName: fk_uhc_user

        - addForeignKeyConstraint:
            baseTableName: user_has_course
            baseColumnNames: course_id
            referencedTableName: course
            referencedColumnNames: id
            constraintName: fk_uhc_course

        - createTable:
            tableName: course_section
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: course_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: section_order
                  type: INTEGER
              - column:
                  name: created_at
                  type: TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
              - column:
                  name: version
                  type: BIGINT
                  defaultValueNumeric: 0

        - addForeignKeyConstraint:
            baseTableName: course_section
            baseColumnNames: course_id
            referencedTableName: course
            referencedColumnNames: id
            constraintName: fk_cs_course

        - createTable:
            tableName: resource
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
              - column:
                  name: course_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: resource_type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP
              - column:
                  name: updated_at
                  type: TIMESTAMP
              - column:
                  name: version
                  type: BIGINT
                  defaultValueNumeric: 0

        - createTable:
            tableName: code_snippet_resource
            columns:
              - column:
                  name: id
                  type: BIGINT
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: snippet_title
                  type: VARCHAR(255)
              - column:
                  name: snippet_description
                  type: TEXT
              - column:
                  name: snippet_document_data
                  type: TEXT
              - column:
                  name: snippet_language
                  type: VARCHAR(100)

        - addForeignKeyConstraint:
            baseTableName: code_snippet_resource
            baseColumnNames: id
            referencedTableName: resource
            referencedColumnNames: id
            constraintName: fk_csr_resource

        - createTable:
            tableName: file_resource
            columns:
              - column:
                  name: id
                  type: BIGINT
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: file_name
                  type: VARCHAR(255)
              - column:
                  name: file_type
                  type: VARCHAR(100)
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: file_data
                  type: BYTEA

        - addForeignKeyConstraint:
            baseTableName: file_resource
            baseColumnNames: id
            referencedTableName: resource
            referencedColumnNames: id
            constraintName: fk_fr_resource

        - createTable:
            tableName: guide_resource
            columns:
              - column:
                  name: id
                  type: BIGINT
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: guide_title
                  type: VARCHAR(255)
              - column:
                  name: guide_description
                  type: TEXT
              - column:
                  name: guide_data
                  type: TEXT

        - addForeignKeyConstraint:
            baseTableName: guide_resource
            baseColumnNames: id
            referencedTableName: resource
            referencedColumnNames: id
            constraintName: fk_gr_resource

        - createTable:
            tableName: link_resource
            columns:
              - column:
                  name: id
                  type: BIGINT
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: link
                  type: VARCHAR(2048)
              - column:
                  name: description
                  type: TEXT

        - addForeignKeyConstraint:
            baseTableName: link_resource
            baseColumnNames: id
            referencedTableName: resource
            referencedColumnNames: id
            constraintName: fk_lr_resource

        - createTable:
            tableName: markdown_document_resource
            columns:
              - column:
                  name: id
                  type: BIGINT
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: md_title
                  type: VARCHAR(255)
              - column:
                  name: md_description
                  type: TEXT
              - column:
                  name: md_document_data
                  type: TEXT

        - addForeignKeyConstraint:
            baseTableName: markdown_document_resource
            baseColumnNames: id
            referencedTableName: resource
            referencedColumnNames: id
            constraintName: fk_mdr_resource

        - createTable:
            tableName: repo_resource
            columns:
              - column:
                  name: id
                  type: BIGINT
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: repo_url
                  type: VARCHAR(2048)
              - column:
                  name: repo_name
                  type: VARCHAR(255)
              - column:
                  name: repo_user_repo
                  type: VARCHAR(255)

        - addForeignKeyConstraint:
            baseTableName: repo_resource
            baseColumnNames: id
            referencedTableName: resource
            referencedColumnNames: id
            constraintName: fk_rr_resource

        - createTable:
            tableName: course_section_has_resource
            columns:
              - column:
                  name: course_section_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: resource_id
                  type: BIGINT
                  constraints:
                    nullable: false

        - addPrimaryKey:
            tableName: course_section_has_resource
            columnNames: course_section_id, resource_id

        - addForeignKeyConstraint:
            baseTableName: course_section_has_resource
            baseColumnNames: course_section_id
            referencedTableName: course_section
            referencedColumnNames: id
            constraintName: fk_cshr_section

        - addForeignKeyConstraint:
            baseTableName: course_section_has_resource
            baseColumnNames: resource_id
            referencedTableName: resource
            referencedColumnNames: id
            constraintName: fk_cshr_resource

        - createTable:
            tableName: event_publication
            columns:
              - column:
                  name: id
                  type: UUID
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: listener_id
                  type: TEXT
                  constraints:
                    nullable: true
              - column:
                  name: event_type
                  type: TEXT
                  constraints:
                    nullable: true
              - column:
                  name: serialized_event
                  type: TEXT
                  constraints:
                    nullable: true
              - column:
                  name: publication_date
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: true
              - column:
                  name: completion_date
                  type: TIMESTAMP WITH TIME ZONE
              - column:
                  name: status
                  type: TEXT
              - column:
                  name: completion_attempts
                  type: INTEGER
              - column:
                  name: last_resubmission_date
                  type: TIMESTAMP WITH TIME ZONE

        - createIndex:
            indexName: event_publication_by_completion_date_idx
            tableName: event_publication
            columns:
              - column:
                  name: completion_date

        - sql:
            dbms: postgresql
            sql: CREATE INDEX IF NOT EXISTS event_publication_serialized_event_hash_idx ON event_publication USING hash(serialized_event);
